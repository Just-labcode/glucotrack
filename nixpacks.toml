[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo", "php84Extensions.pdo_sqlite", "php84Extensions.mbstring", "php84Extensions.tokenizer", "php84Extensions.xml", "php84Extensions.ctype", "php84Extensions.fileinfo", "php84Extensions.curl"]

[phases.build]
cmds = ["composer install --no-dev --optimize-autoloader", "php artisan config:clear"]

[start]
cmd = "php artisan migrate --force && php -S 0.0.0.0:$PORT -t public"